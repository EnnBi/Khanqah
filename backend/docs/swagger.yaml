  /auth/otp/send:
    post:
      consumes:
      - application/json
      description: Send a 6-digit OTP via SMS. Rate-limited to 3 requests per 10 minutes
        per phone number.
      parameters:
      - description: Phone number
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.sendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.otpSentResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.errorResponse'
      summary: Send OTP
      tags:
      - auth
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      description: Verify OTP and receive JWT access + refresh tokens. Creates user
        on first login.
      parameters:
      - description: Phone and OTP
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.verifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.verifyOTPResponse'
        "400":
          description: Bad Request
