  /admin/upload:
    post:
      consumes:
      - application/json
      description: Returns a pre-signed PUT URL for direct upload to Cloudflare R2.
        Valid 15 minutes.
      parameters:
      - description: File info
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.uploadURLRequest'
