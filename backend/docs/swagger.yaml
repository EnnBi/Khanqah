definitions:
  handler.errorResponse:
    properties:
      error:
        example: phone is required
        type: string
    type: object
  handler.otpSentResponse:
    properties:
      message:
        example: OTP sent
        type: string
    type: object
  handler.refreshTokenRequest:
    properties:
      refresh_token:
        type: string
    type: object
  handler.refreshTokenResponse:
    properties:
      access_token:
        type: string
    type: object
  handler.sendOTPRequest:
    properties:
      phone:
        example: "+919876543210"
        type: string
    type: object
  handler.startLiveRequest:
    properties:
      stream_url:
        example: rtmp://live.example.com/live/key
        type: string
      title_en:
        example: Friday Bayan
        type: string
      title_ur:
        example: جمعہ بیان
        type: string
    type: object
  handler.updateUserRoleRequest:
    properties:
      role:
        example: editor
        type: string
    type: object
  handler.uploadURLRequest:
    properties:
      content_type:
        example: audio/mpeg
        type: string
      filename:
        example: bayan.mp3
        type: string
    type: object
  handler.uploadURLResponse:
    properties:
      cdn_url:
        type: string
      file_key:
        example: content/1716200000000000000.mp3
        type: string
      upload_url:
        type: string
    type: object
  handler.upsertProgressRequest:
    properties:
      completed:
        example: false
        type: boolean
      position_seconds:
        example: 120
        type: integer
    type: object
  handler.verifyOTPRequest:
    properties:
      otp:
        example: "123456"
        type: string
      phone:
        example: "+919876543210"
        type: string
    type: object
  handler.verifyOTPResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      role:
        example: listener
        type: string
    type: object
info:
  contact: {}
paths:
  /admin/bugs:
    get:
      parameters:
      - description: Filter by status (open, in_progress, resolved, closed)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: object
            type: array
      security:
      - BearerAuth: []
      summary: List bug reports
      tags:
