# RTMP-only configuration — included via main nginx.conf
# HTTP/HLS serving is handled by nginx-web.conf on port 80
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record all;
            record_path /tmp/recordings;
            record_suffix -%Y%m%d-%H%M%S.flv;
            record_unique on;

            # When recording finishes, run the upload script
            exec_record_done /opt/khanqah/record-and-upload.sh $path $basename;

            # HLS output
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3;
            hls_playlist_length 60;

            # Allow publish from any IP (secure with stream key in production)
            allow publish all;
            allow play all;
        }
    }
}
