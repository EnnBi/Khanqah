# RTMP-only configuration — included via main nginx.conf
# HTTP/HLS serving is handled by nginx-web.conf on port 80
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record all;
            record_path /tmp/recordings;
            record_suffix -%Y%m%d-%H%M%S.flv;
            record_unique on;

            # When recording finishes, run the upload script
            exec_record_done /opt/khanqah/record-and-upload.sh $path $basename;

            # HLS output — tuned for low latency (~4–6 s glass-to-glass
            # vs. the 9–12 s you get with 3 s fragments and a long
            # playlist). For true sub-second latency you'd need LL-HLS
            # or WebRTC.
            hls off;
            hls_path /tmp/hls;
            hls_fragment 2;
            hls_playlist_length 30;
            hls_sync 100ms;

            # Allow publish from any IP (secure with stream key in production)
            allow publish all;
            allow play all;
        }
    }
}
