server {
    server_name arrashid.ennbi.com _;

    root /var/www/khanqah;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HLS stream — serve directly from RTMP module output directory
    location /hls {
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        root /tmp;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # Remote config endpoint (CORS-enabled for cross-origin fetches)
    location /api/config.json {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        alias /opt/khanqah/config.json;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control" always;
        add_header Vary "Origin" always;
    }

    # Health check
    location /api/health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # WebSocket relay for live audio broadcasting. Upgrades the HTTP(S)
    # connection to WS and pipes to the local audio-relay service on
    # 127.0.0.1:3001. Terminating TLS here means the client can use wss://
    # from an HTTPS origin without a mixed-content block.
    location /ws/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # PDF proxy — lets pdfjs (react-pdf) fetch archive.org PDFs cross-origin.
    # archive.org /download/<id>/<file> 302-redirects to a dn<n>.*.archive.org
    # data node, and neither end sends Access-Control-Allow-Origin, so browser
    # CORS blocks the fetch. We proxy server-side, follow the redirect in
    # @pdf_redirect, and add the CORS header to our response.
    #
    # Encoding pitfall that drove much pain: nginx re-encodes percent-escapes
    # (`%20` → `%2520`) whenever a variable or regex capture is interpolated
    # into a proxy_pass URI. The one form that does NOT re-encode is the
    # "prefix replacement" style: `proxy_pass https://host/path/;` against a
    # `location ^~ /prefix/`. The suffix is appended verbatim, spaces stay
    # `%20`, and archive.org responds correctly.
    #
    # So: main location uses the plain prefix form, and @pdf_redirect uses a
    # `set` intermediate (which preserves the upstream Location verbatim) to
    # capture the Location header before the upstream subsystem clears it.
    location ^~ /pdf-proxy/ {
        resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        # Plain prefix replacement — the bit after /pdf-proxy/ is appended to
        # /download/ with its percent-escapes untouched.
        proxy_pass https://archive.org/download/;
        proxy_ssl_server_name on;
        proxy_set_header Host archive.org;
        proxy_set_header User-Agent "khanqah-pdf-proxy/1.0";
        proxy_set_header Range $http_range;

        # archive.org always 302s from /download/; follow it in @pdf_redirect.
        proxy_intercept_errors on;
        error_page 301 302 307 = @pdf_redirect;

        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 0;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;

        # Don't cache at this hop — the response is always a transient 302.
        # Actual PDF bytes are cached in @pdf_redirect.

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Content-Type" always;
    }

    location @pdf_redirect {
        resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;

        # 1 MB range caching: client byte-range requests get aligned to 1 MB
        # slices upstream, each slice is stored on disk, future requests that
        # overlap a cached slice are served from disk.
        slice 1m;

        # CRITICAL: `set $var $upstream_http_location` BEFORE `proxy_pass`
        # captures the Location header's raw value (with %20 preserved)
        # during the rewrite phase. Referring to $upstream_http_location
        # directly in proxy_pass evaluates at content phase, by which time
        # nginx has cleared the upstream variables. Plain variable
        # interpolation via `set` doesn't re-encode, unlike regex capture.
        set $pdf_redirect_target $upstream_http_location;
        proxy_pass $pdf_redirect_target;
        proxy_ssl_server_name on;
        proxy_set_header User-Agent "khanqah-pdf-proxy/1.0";
        # slice module drives the upstream range.
        proxy_set_header Range $slice_range;

        # Rarely, archive.org bounces data-node → data-node before serving.
        proxy_intercept_errors on;
        error_page 301 302 307 = @pdf_redirect;

        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 0;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;

        proxy_cache pdf_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri$slice_range";
        proxy_cache_valid 200 206 7d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        # archive.org's Cache-Control would otherwise override our valid window.
        proxy_ignore_headers Cache-Control Set-Cookie Expires;
        add_header X-Cache-Status $upstream_cache_status always;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Content-Type" always;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/arrashid.ennbi.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/arrashid.ennbi.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = arrashid.ennbi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name arrashid.ennbi.com _;
    return 404; # managed by Certbot


}