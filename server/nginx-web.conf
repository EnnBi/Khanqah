server {
    listen 80;
    server_name _;

    root /var/www/khanqah;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HLS stream — serve directly from RTMP module output directory
    location /hls {
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        root /tmp;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # Remote config endpoint (CORS-enabled for cross-origin fetches)
    location /api/config.json {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        alias /opt/khanqah/config.json;
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, Cache-Control" always;
        add_header Vary "Origin" always;
    }

    # Health check
    location /api/health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # PDF proxy — lets pdfjs (react-pdf) fetch archive.org PDFs cross-origin.
    # archive.org /download/ endpoints 302-redirect to ia<n>.us.archive.org data
    # nodes, and neither the redirect response nor the data node send
    # Access-Control-Allow-Origin, so browsers block the fetch. We proxy here
    # and follow the redirect in @pdf_redirect.
    #
    # Range requests are passed through (for pdfjs streaming). Responses are
    # cached on-disk so repeat byte ranges don't re-round-trip to archive.org.
    #
    # Usage: /pdf-proxy/<identifier>/<file.pdf>
    #        → https://archive.org/download/<identifier>/<file.pdf> (follow 302)
    location ~ ^/pdf-proxy/(?<ia_path>.+)$ {
        resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        proxy_pass https://archive.org/download/$ia_path$is_args$args;
        proxy_ssl_server_name on;
        proxy_set_header Host archive.org;
        proxy_set_header User-Agent "khanqah-pdf-proxy/1.0";
        # Pass the Range header through so pdfjs's byte-range streaming works.
        proxy_set_header Range $http_range;

        proxy_intercept_errors on;
        error_page 301 302 307 = @pdf_redirect;

        # proxy_cache requires buffering (off disables caching entirely).
        # With slice=1m upstream, one slice fits comfortably in the buffers.
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 0;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;

        # Don't cache at this hop — the upstream response is always a 302
        # whose Location points at a per-request-signed data node. Caching
        # it freezes the redirect and breaks subsequent requests. The actual
        # PDF bytes are cached in @pdf_redirect below.

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Content-Type" always;
    }

    location @pdf_redirect {
        resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;

        # Byte-range caching via the slice module: client range requests get
        # aligned to 1 MB slices upstream, each slice is cached, and any
        # future range overlapping a cached slice is served from disk.
        # Without this, 206 responses are NOT cached by nginx at all, which
        # is why pdfjs's 64KB range storm was re-hitting archive.org.
        slice 1m;

        # $upstream_http_location is the Location header from the 302.
        # Using a variable in proxy_pass picks Host from the URL hostname.
        set $pdf_redirect_target $upstream_http_location;
        proxy_pass $pdf_redirect_target;
        proxy_ssl_server_name on;
        proxy_set_header User-Agent "khanqah-pdf-proxy/1.0";
        # slice module drives upstream range — overrides the client's Range.
        proxy_set_header Range $slice_range;

        # Follow a second-level redirect (archive.org sometimes bounces from
        # ia601207 → ia801207 before serving the bytes).
        proxy_intercept_errors on;
        error_page 301 302 307 = @pdf_redirect;

        # proxy_cache requires buffering (off disables caching entirely).
        # With slice=1m upstream, one slice fits comfortably in the buffers.
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 0;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;

        proxy_cache pdf_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri$slice_range";
        proxy_cache_valid 200 206 7d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        # archive.org sets Cache-Control which would otherwise override our
        # valid window. Trust our own cache policy.
        proxy_ignore_headers Cache-Control Set-Cookie Expires;
        add_header X-Cache-Status $upstream_cache_status always;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges, Content-Type" always;
    }
}
