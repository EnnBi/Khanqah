<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>خانقاہ — حضرت | سوالات کی فیڈ (Mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0f2e24;
    --green-deep:#0a201a; --green-card:#143a2e;
    --gold:#d4a853; --gold-soft:#e7c884;
    --cream:#f7f5f0; --muted:#9fb3a6;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{background:#222; font-family:'Noto Nastaliq Urdu', serif; display:flex; gap:28px; justify-content:center; align-items:flex-start; padding:28px 16px; flex-wrap:wrap;}
  .label{color:#bbb; font-family:system-ui,sans-serif; text-align:center; font-size:13px; margin-top:10px; direction:ltr;}

  /* phone frame */
  .phone{width:360px; height:740px; background:var(--green-deep); border-radius:40px; overflow:hidden; position:relative; box-shadow:0 18px 60px rgba(0,0,0,.5); border:8px solid #000;}

  /* vertical scroll-snap feed */
  .feed{height:100%; overflow-y:scroll; scroll-snap-type:y mandatory; scroll-behavior:smooth;}
  .feed::-webkit-scrollbar{display:none;}
  .card{height:100%; scroll-snap-align:start; position:relative; display:flex; flex-direction:column;
        background:radial-gradient(120% 80% at 50% 0%, var(--green-card) 0%, var(--green-deep) 70%); padding:54px 22px 120px;}

  /* top bar: counter + questioner */
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .counter{color:var(--gold); font-size:20px; font-weight:700; background:rgba(212,168,83,.12); border:1px solid rgba(212,168,83,.3); border-radius:20px; padding:2px 14px; min-width:64px; text-align:center;}
  .who{ text-align:right; line-height:2; }
  .who .name{color:var(--cream); font-size:23px; font-weight:700;}
  .who .meta{color:var(--muted); font-size:16px;}

  /* question body */
  .qwrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px; min-height:0;}
  .qtext{color:var(--cream); font-size:27px; line-height:2.25; text-align:center; max-height:230px; overflow-y:auto; padding:4px 6px;}
  .qtext::-webkit-scrollbar{width:3px;} .qtext::-webkit-scrollbar-thumb{background:rgba(212,168,83,.4); border-radius:3px;}

  /* play button */
  .play{position:relative; width:104px; height:104px; border-radius:50%; border:none; cursor:pointer;
        background:linear-gradient(160deg,var(--gold-soft),var(--gold)); color:var(--green-deep); font-size:42px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 26px rgba(212,168,83,.4);}
  .play.playing::after{content:''; position:absolute; inset:-8px; border-radius:50%; border:3px solid rgba(212,168,83,.5); animation:pulse 1.4s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(1);opacity:.8} 100%{transform:scale(1.35);opacity:0}}
  .progress{width:78%; height:6px; background:rgba(255,255,255,.15); border-radius:6px; overflow:hidden;}
  .progress > i{display:block; height:100%; width:0%; background:var(--gold); border-radius:6px; transition:width .2s linear;}
  .hint{color:var(--muted); font-size:15px;}

  /* swipe-up affordance */
  .next{position:absolute; bottom:96px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:2px; color:var(--muted); cursor:pointer; background:none; border:none; font-family:inherit;}
  .next .chev{font-size:26px; color:var(--gold); animation:bob 1.6s ease-in-out infinite; font-family:system-ui;}
  .next span{font-size:15px;}
  @keyframes bob{0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}}

  /* floating answer button */
  .answer-fab{position:absolute; bottom:24px; left:22px; right:22px; height:62px; border:none; border-radius:18px; cursor:pointer;
              background:linear-gradient(160deg,var(--gold-soft),var(--gold)); color:var(--green-deep); font-family:inherit; font-size:24px; font-weight:700; box-shadow:0 10px 28px rgba(212,168,83,.45); display:flex; align-items:center; justify-content:center; gap:10px; z-index:5;}

  /* record sheet */
  .scrim{position:absolute; inset:0; background:rgba(5,15,11,.72); opacity:0; pointer-events:none; transition:opacity .25s; z-index:8;}
  .scrim.open{opacity:1; pointer-events:auto;}
  .sheet{position:absolute; left:0; right:0; bottom:0; transform:translateY(100%); transition:transform .3s cubic-bezier(.2,.8,.2,1);
         background:var(--green-card); border-top-left-radius:26px; border-top-right-radius:26px; padding:26px 22px 30px; z-index:9; text-align:center;}
  .sheet.open{transform:translateY(0);}
  .sheet h3{color:var(--cream); font-size:24px; font-weight:700; margin-bottom:20px;}
  .mic{width:120px; height:120px; border-radius:50%; border:none; cursor:pointer; margin:6px auto 14px; display:flex; align-items:center; justify-content:center; font-size:50px;
       background:rgba(212,168,83,.16); border:2px solid var(--gold); color:var(--gold); position:relative;}
  .mic.rec{background:#c23e3e; border-color:#c23e3e; color:#fff;}
  .mic.rec::after{content:''; position:absolute; inset:-10px; border-radius:50%; border:3px solid rgba(194,62,62,.5); animation:pulse 1.2s ease-out infinite;}
  .timer{color:var(--cream); font-size:30px; font-weight:700; direction:ltr; letter-spacing:2px; min-height:38px;}
  .waves{display:flex; gap:4px; justify-content:center; align-items:flex-end; height:34px; margin:8px 0 4px;}
  .waves i{width:4px; background:var(--gold); border-radius:3px; height:8px;}
  .waves.on i{animation:wv .8s ease-in-out infinite;}
  .waves i:nth-child(2){animation-delay:.1s}.waves i:nth-child(3){animation-delay:.2s}.waves i:nth-child(4){animation-delay:.3s}.waves i:nth-child(5){animation-delay:.15s}.waves i:nth-child(6){animation-delay:.25s}.waves i:nth-child(7){animation-delay:.05s}
  @keyframes wv{0%,100%{height:8px}50%{height:30px}}
  .sheet-actions{display:flex; gap:12px; margin-top:18px;}
  .btn{flex:1; height:58px; border-radius:16px; border:none; cursor:pointer; font-family:inherit; font-size:22px; font-weight:700;}
  .btn.send{background:var(--gold); color:var(--green-deep);} .btn.send:disabled{opacity:.4;}
  .btn.redo{background:transparent; color:var(--cream); border:1px solid rgba(255,255,255,.25);}
  .cancel{position:absolute; top:14px; left:18px; background:none; border:none; color:var(--muted); font-size:26px; cursor:pointer; font-family:system-ui;}

  /* toast */
  .toast{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.9); background:rgba(10,32,26,.95); border:1px solid var(--gold); color:var(--cream); padding:22px 30px; border-radius:18px; font-size:24px; opacity:0; pointer-events:none; transition:all .25s; z-index:12; text-align:center;}
  .toast.show{opacity:1; transform:translate(-50%,-50%) scale(1);}
</style>
</head>
<body>
  <div>
    <div class="phone">
      <div class="feed" id="feed">
        <!-- cards injected by JS -->
      </div>

      <!-- record sheet (shared) -->
      <div class="scrim" id="scrim"></div>
      <div class="sheet" id="sheet">
        <button class="cancel" onclick="closeSheet()">✕</button>
        <h3 id="sheetTitle">جواب ریکارڈ کریں</h3>
        <button class="mic" id="mic" onclick="toggleRec()">🎙</button>
        <div class="timer" id="timer">0:00</div>
        <div class="waves" id="waves"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
        <div class="hint" id="recHint">دبائیں اور بولیں</div>
        <div class="sheet-actions">
          <button class="btn redo" onclick="resetRec()">دوبارہ</button>
          <button class="btn send" id="sendBtn" onclick="sendAnswer()" disabled>بھیجیں ✓</button>
        </div>
      </div>

      <div class="toast" id="toast">✓ جواب بھیج دیا گیا</div>
    </div>
    <div class="label">Shaykh app — “question feed” concept · scroll up / tap ↑ for next · tap mic to record · (Noto Nastaliq web font ≈ Jameel Noori)</div>
  </div>

<script>
  const questions = [
    {name:"محمد احمد", city:"کراچی", text:"کیا سفر کے دوران نماز قصر کرنا ضروری ہے یا اختیار ہے؟ اور کتنے سفر پر قصر شروع ہوتی ہے؟"},
    {name:"علی حسن",   city:"لاہور", text:"زکوٰۃ کن اموال پر فرض ہوتی ہے اور اس کی مقدار کیا ہے؟"},
    {name:"فاطمہ بی بی", city:"اسلام آباد", text:"کیا والدین کی اجازت کے بغیر نفلی روزہ رکھا جا سکتا ہے؟"},
    {name:"عبداللہ", city:"پشاور", text:"اگر نماز میں کوئی آیت بھول جائے تو سجدہ سہو کب اور کیسے کیا جائے؟"},
    {name:"زینب", city:"ملتان", text:"قرض کی واپسی میں اضافی رقم دینا جائز ہے یا یہ سود میں آتا ہے؟"},
  ];
  const ur = n => n.toString().replace(/\d/g, d => "۰۱۲۳۴۵۶۷۸۹"[d]);
  const total = questions.length;

  const feed = document.getElementById('feed');
  questions.forEach((q,i)=>{
    const c = document.createElement('div'); c.className='card';
    c.innerHTML = `
      <div class="topbar">
        <div class="counter">${ur(i+1)} / ${ur(total)}</div>
        <div class="who"><div class="name">${q.name}</div><div class="meta">${q.city}</div></div>
      </div>
      <div class="qwrap">
        <button class="play" onclick="togglePlay(this)">▶</button>
        <div class="progress"><i></i></div>
        <div class="hint">سوال سننے کے لیے دبائیں</div>
        <div class="qtext">${q.text}</div>
      </div>
      ${ i < total-1 ? `<button class="next" onclick="goNext(${i})"><span class="chev">︿</span><span>اگلا سوال</span></button>` : '' }
      <button class="answer-fab" onclick="openSheet(${i})">جواب دیں 🎙</button>`;
    feed.appendChild(c);
  });

  let playTimer=null;
  function togglePlay(btn){
    const bar = btn.parentElement.querySelector('.progress > i');
    if(btn.classList.contains('playing')){ btn.classList.remove('playing'); btn.textContent='▶'; clearInterval(playTimer); return; }
    document.querySelectorAll('.play.playing').forEach(p=>{p.classList.remove('playing');p.textContent='▶';});
    clearInterval(playTimer);
    btn.classList.add('playing'); btn.textContent='❚❚';
    let w=0; bar.style.width='0%';
    playTimer=setInterval(()=>{ w+=2; bar.style.width=w+'%'; if(w>=100){clearInterval(playTimer); btn.classList.remove('playing'); btn.textContent='▶';}},120);
  }
  function goNext(i){ const cards=document.querySelectorAll('.card'); if(cards[i+1]) cards[i+1].scrollIntoView({behavior:'smooth'}); }

  // record sheet
  let recOn=false, recT=null, secs=0, hasRec=false;
  const scrim=document.getElementById('scrim'), sheet=document.getElementById('sheet'),
        mic=document.getElementById('mic'), timer=document.getElementById('timer'),
        waves=document.getElementById('waves'), sendBtn=document.getElementById('sendBtn'),
        recHint=document.getElementById('recHint'), toast=document.getElementById('toast');
  function openSheet(){ resetRec(); scrim.classList.add('open'); sheet.classList.add('open'); }
  function closeSheet(){ stopRec(); scrim.classList.remove('open'); sheet.classList.remove('open'); }
  function resetRec(){ stopRec(); secs=0; hasRec=false; timer.textContent='0:00'; sendBtn.disabled=true; mic.textContent='🎙'; recHint.textContent='دبائیں اور بولیں'; }
  function toggleRec(){ recOn ? stopRec(true) : startRec(); }
  function startRec(){ recOn=true; mic.classList.add('rec'); mic.textContent='■'; waves.classList.add('on'); recHint.textContent='ریکارڈنگ جاری ہے… (زیادہ سے زیادہ ۵ منٹ)';
    recT=setInterval(()=>{ secs++; const m=Math.floor(secs/60), s=secs%60; timer.textContent=`${m}:${s.toString().padStart(2,'0')}`; if(secs>=300) stopRec(true); },1000); }
  function stopRec(markDone){ if(recT){clearInterval(recT); recT=null;} recOn=false; mic.classList.remove('rec'); mic.textContent='🎙'; waves.classList.remove('on');
    if(markDone && secs>0){ hasRec=true; sendBtn.disabled=false; recHint.textContent='سن کر دوبارہ ریکارڈ کر سکتے ہیں'; } }
  function sendAnswer(){ closeSheet(); toast.classList.add('show'); setTimeout(()=>{ toast.classList.remove('show'); }, 1300); }
</script>
</body>
</html>
