name: Deploy web + nginx to DO

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  DEPLOY_HOST: 165.22.208.103
  DEPLOY_USER: root
  WEB_ROOT: /var/www/khanqah
  NGINX_SITE: /etc/nginx/sites-available/khanqah

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npx expo export --platform web

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync web bundle
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            dist/ "$DEPLOY_USER@$DEPLOY_HOST:$WEB_ROOT/"

      - name: Deploy nginx config (if changed) and reload
        run: |
          scp -i ~/.ssh/deploy_key \
            server/nginx-web.conf \
            "$DEPLOY_USER@$DEPLOY_HOST:$NGINX_SITE"
          ssh -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'nginx -t && systemctl reload nginx'

      - name: Smoke test
        run: |
          curl -fsSLI "http://$DEPLOY_HOST/api/health" | head -1
