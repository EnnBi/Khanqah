name: Deploy web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

env:
  DEPLOY_HOST: 165.22.208.103
  DEPLOY_USER: root
  WEB_ROOT: /var/www/khanqah

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: web
        run: npm run build

      - name: Configure SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            web/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$WEB_ROOT/"

      - name: Smoke test
        run: curl -fsSL "https://arrashid.ennbi.com" -o /dev/null -w "%{http_code}" | grep -q 200
